name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Download official Gradle distribution
        run: |
          curl -fsSL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" -o "$RUNNER_TEMP/gradle-8.7-bin.zip"
          unzip -q "$RUNNER_TEMP/gradle-8.7-bin.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Generate wrapper from official Gradle
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x ./gradlew

      - name: Verify wrapper
        run: ./gradlew -v

      - name: Build debug
        run: ./gradlew :app:assembleDebug

      - name: Build release
        run: ./gradlew :app:assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
